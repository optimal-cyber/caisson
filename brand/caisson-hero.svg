<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 760" width="680" height="760" role="img" aria-label="Caisson, a cute armored combat-engineer guardian, holding up a glowing hex key in front of his sealed hexagonal vault">
  <title>Caisson — chibi mascot hero</title>
  <desc>An original, cute chibi armored guardian with big friendly cyan eyes, raising a glowing hex key, a sealed hexagonal vault glowing behind him over an 80s cosmic sunset.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#060912"/>
      <stop offset="0.55" stop-color="#0C1122"/>
      <stop offset="1" stop-color="#141A30"/>
    </linearGradient>
    <linearGradient id="violet-wash" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8B5CF6" stop-opacity="0.12"/>
      <stop offset="0.6" stop-color="#8B5CF6" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="sun" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#FFD77A"/>
      <stop offset="0.45" stop-color="#F5793B"/>
      <stop offset="0.8" stop-color="#F5793B" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#F5793B" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="plate" x1="0" y1="0" x2="0.35" y2="1">
      <stop offset="0" stop-color="#5A6B96"/>
      <stop offset="0.5" stop-color="#3A4668"/>
      <stop offset="1" stop-color="#1B2440"/>
    </linearGradient>
    <linearGradient id="plate-hi" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0" stop-color="#6E80AC"/>
      <stop offset="1" stop-color="#3A4668"/>
    </linearGradient>
    <linearGradient id="vault-face2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1B2440"/>
      <stop offset="1" stop-color="#0A0E1C"/>
    </linearGradient>
    <radialGradient id="eye" cx="0.4" cy="0.35" r="0.8">
      <stop offset="0" stop-color="#CFFFFB"/>
      <stop offset="0.4" stop-color="#7FF5EE"/>
      <stop offset="1" stop-color="#37E1D6"/>
    </radialGradient>
    <radialGradient id="seal2" cx="0.5" cy="0.4" r="0.7">
      <stop offset="0" stop-color="#FFD77A"/>
      <stop offset="0.55" stop-color="#F4B23C"/>
      <stop offset="1" stop-color="#B9781E"/>
    </radialGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-soft" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="9"/>
    </filter>
  </defs>

  <!-- ==== BACKDROP ==== -->
  <rect width="680" height="760" fill="url(#sky)"/>
  <rect width="680" height="460" fill="url(#violet-wash)"/>
  <g fill="#E7ECF7">
    <circle cx="80" cy="90" r="1.6" opacity="0.8"/><circle cx="150" cy="180" r="1.1" opacity="0.6"/>
    <circle cx="590" cy="70" r="1.7" opacity="0.85"/><circle cx="628" cy="200" r="1.2" opacity="0.6"/>
    <circle cx="500" cy="120" r="1.1" opacity="0.5"/><circle cx="250" cy="60" r="1.3" opacity="0.6"/>
    <circle cx="40" cy="300" r="1.2" opacity="0.5"/><circle cx="640" cy="330" r="1.4" opacity="0.6"/>
    <circle cx="340" cy="36" r="1.5" opacity="0.7"/><circle cx="110" cy="420" r="1.1" opacity="0.45"/>
  </g>

  <!-- sun -->
  <circle cx="340" cy="360" r="215" fill="url(#sun)"/>
  <g stroke="#0C1122" stroke-width="7" opacity="0.85">
    <line x1="185" y1="452" x2="495" y2="452"/>
    <line x1="176" y1="490" x2="504" y2="490"/>
    <line x1="172" y1="528" x2="508" y2="528"/>
  </g>

  <!-- synth floor -->
  <rect x="0" y="560" width="680" height="200" fill="#0A0E1C"/>
  <g stroke="#37E1D6" stroke-width="1.4" opacity="0.32">
    <line x1="340" y1="560" x2="-260" y2="760"/>
    <line x1="340" y1="560" x2="120" y2="760"/>
    <line x1="340" y1="560" x2="300" y2="760"/>
    <line x1="340" y1="560" x2="380" y2="760"/>
    <line x1="340" y1="560" x2="560" y2="760"/>
    <line x1="340" y1="560" x2="940" y2="760"/>
    <line x1="0" y1="600" x2="680" y2="600"/>
    <line x1="0" y1="652" x2="680" y2="652"/>
    <line x1="0" y1="716" x2="680" y2="716"/>
  </g>

  <!-- ==== THE VAULT (behind him, like a big glowing backpack) ==== -->
  <g>
    <polygon points="340,65 556.5,190 556.5,440 340,565 123.5,440 123.5,190"
             fill="url(#vault-face2)" stroke="#060912" stroke-width="10" stroke-linejoin="round" opacity="0.97"/>
    <polygon points="340,105 521.9,210 521.9,420 340,525 158.1,420 158.1,210"
             fill="none" stroke="#263156" stroke-width="6" stroke-linejoin="round"/>
    <g filter="url(#glow)" stroke="#37E1D6" stroke-width="5" stroke-linecap="round" opacity="0.9">
      <line x1="340" y1="315" x2="340" y2="105"/>
      <line x1="340" y1="315" x2="521.9" y2="210"/>
      <line x1="340" y1="315" x2="521.9" y2="420"/>
      <line x1="340" y1="315" x2="340" y2="525"/>
      <line x1="340" y1="315" x2="158.1" y2="420"/>
      <line x1="340" y1="315" x2="158.1" y2="210"/>
    </g>
    <g fill="#F4B23C">
      <circle cx="340" cy="105" r="6"/><circle cx="521.9" cy="210" r="6"/><circle cx="521.9" cy="420" r="6"/>
      <circle cx="340" cy="525" r="6"/><circle cx="158.1" cy="420" r="6"/><circle cx="158.1" cy="210" r="6"/>
    </g>
  </g>

  <!-- ==== LEGS + BOOTS (short & stubby) ==== -->
  <g stroke="#060912" stroke-width="30" stroke-linecap="round">
    <line x1="312" y1="474" x2="305" y2="576"/>
    <line x1="368" y1="474" x2="375" y2="576"/>
  </g>
  <g stroke="#3A4668" stroke-width="22" stroke-linecap="round">
    <line x1="312" y1="474" x2="305" y2="576"/>
    <line x1="368" y1="474" x2="375" y2="576"/>
  </g>
  <!-- boots -->
  <g stroke="#060912" stroke-width="5" stroke-linejoin="round">
    <path d="M266,570 h64 a16,16 0 0 1 16,16 v20 a10,10 0 0 1 -10,10 h-78 a14,14 0 0 1 -14,-14 v-4 c0,-18 14,-28 22,-34 Z" fill="url(#plate)"/>
    <path d="M414,570 h-64 a16,16 0 0 0 -16,16 v20 a10,10 0 0 0 10,10 h78 a14,14 0 0 0 14,-14 v-4 c0,-18 -14,-28 -22,-34 Z" fill="url(#plate)"/>
  </g>
  <g fill="#F4B23C">
    <rect x="268" y="566" width="72" height="8" rx="4"/>
    <rect x="340" y="566" width="72" height="8" rx="4"/>
  </g>

  <!-- ==== BODY ==== -->
  <path d="M300,360 C268,360 250,386 253,422 C255,456 276,484 340,486 C404,484 425,456 427,422 C430,386 412,360 380,360 Z"
        fill="url(#plate)" stroke="#060912" stroke-width="6" stroke-linejoin="round"/>
  <!-- little belly cel highlight -->
  <path d="M300,372 C280,374 266,392 268,414 C280,398 300,392 316,392 Z" fill="#5A6B96" opacity="0.5"/>
  <!-- pack straps -->
  <g stroke="#263156" stroke-width="12" stroke-linecap="round">
    <line x1="292" y1="372" x2="384" y2="474"/>
    <line x1="388" y1="372" x2="296" y2="474"/>
  </g>
  <g stroke="#F4B23C" stroke-width="2.5" opacity="0.75">
    <line x1="292" y1="372" x2="384" y2="474"/>
    <line x1="388" y1="372" x2="296" y2="474"/>
  </g>
  <!-- chest seal medallion -->
  <g filter="url(#glow)">
    <polygon points="340,381 369.4,398 369.4,432 340,449 310.6,432 310.6,398"
             fill="url(#seal2)" stroke="#060912" stroke-width="4" stroke-linejoin="round"/>
  </g>
  <circle cx="340" cy="410" r="6.5" fill="#060912"/>
  <polygon points="335.5,414 344.5,414 347,434 333,434" fill="#060912"/>

  <!-- ==== ARMS (short & stubby) ==== -->
  <!-- down/off arm (his left) -->
  <g stroke="#060912" stroke-width="28" stroke-linecap="round">
    <path d="M415,392 Q452,410 452,452" fill="none"/>
  </g>
  <g stroke="#3A4668" stroke-width="20" stroke-linecap="round">
    <path d="M415,392 Q452,410 452,452" fill="none"/>
  </g>
  <circle cx="452" cy="456" r="21" fill="url(#plate)" stroke="#060912" stroke-width="5"/>
  <path d="M452,435 a21,21 0 0 1 0,42" fill="none" stroke="#F4B23C" stroke-width="3" opacity="0.7"/>

  <!-- raised arm (his right) -->
  <g stroke="#060912" stroke-width="28" stroke-linecap="round">
    <path d="M266,388 Q226,352 214,268" fill="none"/>
  </g>
  <g stroke="#3A4668" stroke-width="20" stroke-linecap="round">
    <path d="M266,388 Q226,352 214,268" fill="none"/>
  </g>

  <!-- ==== HEAD ==== (big & round) -->
  <path d="M212,246 C212,166 262,120 340,120 C418,120 468,166 468,246 C468,312 432,356 340,362 C248,356 212,312 212,246 Z"
        fill="url(#plate)" stroke="#060912" stroke-width="7" stroke-linejoin="round"/>
  <!-- upper-left cel shine -->
  <path d="M250,206 C246,170 276,140 322,134 C300,150 276,178 268,214 Z" fill="#6E80AC" opacity="0.45"/>
  <!-- crest -->
  <g stroke="#060912" stroke-width="5" stroke-linejoin="round">
    <polygon points="340,98 356,107 356,125 340,134 324,125 324,107" fill="#F4B23C"/>
  </g>
  <rect x="336" y="120" width="8" height="10" fill="#B9781E"/>

  <!-- visor plate (goggle shape) -->
  <path d="M258,224 C258,204 278,196 340,196 C402,196 422,204 422,224 C422,262 398,286 340,288 C282,286 258,262 258,224 Z"
        fill="#0B1020" stroke="#060912" stroke-width="5" stroke-linejoin="round"/>

  <!-- big friendly eyes -->
  <g filter="url(#glow)">
    <ellipse cx="304" cy="242" rx="25" ry="30" fill="url(#eye)"/>
    <ellipse cx="376" cy="242" rx="25" ry="30" fill="url(#eye)"/>
  </g>
  <!-- eye highlights -->
  <g fill="#FFFFFF">
    <circle cx="296" cy="232" r="7"/><circle cx="368" cy="232" r="7"/>
    <circle cx="311" cy="252" r="3.4" opacity="0.85"/><circle cx="383" cy="252" r="3.4" opacity="0.85"/>
  </g>

  <!-- little gold nose ridge + cheek bolts -->
  <polygon points="337,290 343,290 341,308 339,308" fill="#F4B23C"/>
  <g fill="#F4B23C">
    <circle cx="250" cy="270" r="4"/><circle cx="430" cy="270" r="4"/>
  </g>
  <!-- tiny friendly smile -->
  <g filter="url(#glow)">
    <path d="M322,320 Q340,336 358,320" fill="none" stroke="#7FF5EE" stroke-width="5" stroke-linecap="round"/>
  </g>

  <!-- ==== RAISED FIST + KEYBOLT (the key) ==== -->
  <circle cx="211" cy="262" r="22" fill="url(#plate)" stroke="#060912" stroke-width="5"/>
  <path d="M211,240 a22,22 0 0 0 0,44" fill="none" stroke="#F4B23C" stroke-width="3" opacity="0.7"/>
  <g stroke="#060912" stroke-width="4" stroke-linejoin="round">
    <rect x="203" y="176" width="16" height="86" rx="4" fill="url(#plate)"/>
    <polygon points="211,150 227,159.5 227,178.5 211,188 195,178.5 195,159.5" fill="url(#seal2)"/>
  </g>
  <g filter="url(#glow)"><circle cx="211" cy="176" r="9" fill="#7FF5EE"/></g>
  <g stroke="#37E1D6" stroke-width="3" stroke-linecap="round" opacity="0.85" filter="url(#glow)">
    <line x1="211" y1="150" x2="211" y2="134"/>
    <line x1="185" y1="176" x2="171" y2="176"/>
    <line x1="237" y1="176" x2="251" y2="176"/>
    <line x1="192" y1="158" x2="181" y2="147"/>
    <line x1="230" y1="158" x2="241" y2="147"/>
  </g>

  <!-- ground glow -->
  <ellipse cx="340" cy="612" rx="150" ry="16" fill="#37E1D6" opacity="0.15" filter="url(#glow-soft)"/>
</svg>
