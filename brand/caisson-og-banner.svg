<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Caisson — Nothing crosses the gap unsealed. Compliance-native airgap delivery.">
  <title>Caisson — social / OG banner</title>
  <defs>
    <linearGradient id="og-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0A0E1C"/><stop offset="0.55" stop-color="#0C1122"/><stop offset="1" stop-color="#070B16"/>
    </linearGradient>
    <radialGradient id="og-glow" cx="0.5" cy="0.32" r="0.5">
      <stop offset="0" stop-color="#37E1D6" stop-opacity="0.20"/><stop offset="0.6" stop-color="#37E1D6" stop-opacity="0.05"/><stop offset="1" stop-color="#37E1D6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="og-chrome" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F6F9FF"/><stop offset="0.42" stop-color="#C9D6EC"/><stop offset="0.5" stop-color="#FFFFFF"/><stop offset="0.6" stop-color="#8A9DC0"/><stop offset="1" stop-color="#586A92"/>
    </linearGradient>
    <linearGradient id="og-steel" x1="0" y1="0" x2="0.25" y2="1">
      <stop offset="0" stop-color="#DCE4F2"/><stop offset="0.5" stop-color="#AEB9D6"/><stop offset="1" stop-color="#7987AD"/>
    </linearGradient>
    <linearGradient id="og-face" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#28324F"/><stop offset="1" stop-color="#141B33"/>
    </linearGradient>
    <radialGradient id="og-gold" cx="0.42" cy="0.35" r="0.8">
      <stop offset="0" stop-color="#FFE29A"/><stop offset="0.5" stop-color="#F4B23C"/><stop offset="1" stop-color="#B9781E"/>
    </radialGradient>
    <filter id="og-eglow" x="-70%" y="-70%" width="240%" height="240%">
      <feGaussianBlur stdDeviation="2.6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- backdrop -->
  <rect width="1200" height="630" fill="url(#og-bg)"/>
  <ellipse cx="600" cy="200" rx="560" ry="360" fill="url(#og-glow)"/>
  <g fill="#E7ECF7" opacity="0.7">
    <circle cx="150" cy="120" r="1.6"/><circle cx="1050" cy="90" r="1.6"/><circle cx="1010" cy="210" r="1.2"/>
    <circle cx="230" cy="470" r="1.3"/><circle cx="980" cy="470" r="1.2"/><circle cx="80" cy="300" r="1.2"/>
  </g>

  <!-- ===== emblem ===== -->
  <g transform="translate(485,85) scale(1.15)">
    <line x1="100" y1="40" x2="100" y2="160" stroke="#37E1D6" stroke-width="4" stroke-linecap="round" opacity="0.9" filter="url(#og-eglow)"/>
    <polygon points="22,62 36,44 72,44 72,156 36,156 22,138" fill="url(#og-steel)" stroke="#0A1020" stroke-width="4" stroke-linejoin="round"/>
    <rect x="36" y="58" width="26" height="84" rx="6" fill="url(#og-face)"/>
    <g fill="#F4B23C"><circle cx="29" cy="76" r="2.6"/><circle cx="29" cy="124" r="2.6"/></g>
    <polygon points="178,62 164,44 128,44 128,156 164,156 178,138" fill="url(#og-steel)" stroke="#0A1020" stroke-width="4" stroke-linejoin="round"/>
    <rect x="138" y="58" width="26" height="84" rx="6" fill="url(#og-face)"/>
    <g fill="#F4B23C"><circle cx="171" cy="76" r="2.6"/><circle cx="171" cy="124" r="2.6"/></g>
    <path d="M108,66 L134,92 Q142,100 134,108 L108,134 Q100,142 92,134 L66,108 Q58,100 66,92 L92,66 Q100,58 108,66 Z" fill="url(#og-gold)" stroke="#0A1020" stroke-width="4" stroke-linejoin="round"/>
    <polygon points="100,64 80,84 90,94 100,84" fill="#FFEFC2" opacity="0.55"/>
    <g filter="url(#og-eglow)" fill="#7FF5EE"><circle cx="66" cy="100" r="3.6"/><circle cx="134" cy="100" r="3.6"/></g>
  </g>

  <!-- ===== wordmark ===== -->
  <g text-anchor="middle" font-family="'Arial Black','Helvetica Neue',Impact,sans-serif" font-weight="900">
    <text x="602" y="432" font-size="132" letter-spacing="9" fill="#070B16">CAISSON</text>
    <text x="600" y="429" font-size="132" letter-spacing="9" fill="url(#og-chrome)" stroke="#0B1020" stroke-width="1.4">CAISSON</text>
  </g>

  <!-- ===== taglines ===== -->
  <g text-anchor="middle" font-family="'Helvetica Neue',Arial,sans-serif">
    <text x="600" y="492" font-size="30" letter-spacing="7" font-weight="700" fill="#37E1D6">NOTHING CROSSES THE GAP UNSEALED</text>
    <text x="600" y="533" font-size="19" letter-spacing="4.5" fill="#C7D0E4">Compliance-native airgap delivery</text>
    <text x="600" y="580" font-size="15.5" letter-spacing="4" fill="#8593B4">SBOM · NIST 800-53 / CMMC · SLSA PROVENANCE</text>
  </g>
</svg>
