<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675" role="img" aria-label="CAISSON title card">
  <title>Caisson — 80s title card</title>
  <defs>
    <linearGradient id="tc-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#060912"/>
      <stop offset="0.6" stop-color="#0C1122"/>
      <stop offset="1" stop-color="#161C34"/>
    </linearGradient>
    <linearGradient id="tc-violet" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8B5CF6" stop-opacity="0.12"/>
      <stop offset="0.55" stop-color="#8B5CF6" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="tc-sun" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#FFD77A"/>
      <stop offset="0.5" stop-color="#F5793B"/>
      <stop offset="0.85" stop-color="#F5793B" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#F5793B" stop-opacity="0"/>
    </radialGradient>
    <!-- 80s chrome: white shine -> steel -> bright line -> gold horizon -->
    <linearGradient id="chrome" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="0.30" stop-color="#BFD4EC"/>
      <stop offset="0.47" stop-color="#7C97BE"/>
      <stop offset="0.50" stop-color="#EAF2FF"/>
      <stop offset="0.54" stop-color="#5E769E"/>
      <stop offset="0.74" stop-color="#F4B23C"/>
      <stop offset="1" stop-color="#B9781E"/>
    </linearGradient>
    <linearGradient id="tc-plate" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0" stop-color="#5A6B96"/>
      <stop offset="0.5" stop-color="#3A4668"/>
      <stop offset="1" stop-color="#1B2440"/>
    </linearGradient>
    <linearGradient id="tc-visor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7FF5EE"/>
      <stop offset="1" stop-color="#37E1D6"/>
    </linearGradient>
    <filter id="tc-glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- backdrop -->
  <rect width="1200" height="675" fill="url(#tc-sky)"/>
  <rect width="1200" height="420" fill="url(#tc-violet)"/>
  <g fill="#E7ECF7">
    <circle cx="120" cy="80" r="1.7" opacity="0.8"/><circle cx="1080" cy="60" r="1.6" opacity="0.8"/>
    <circle cx="300" cy="120" r="1.2" opacity="0.55"/><circle cx="900" cy="140" r="1.3" opacity="0.6"/>
    <circle cx="60" cy="220" r="1.3" opacity="0.5"/><circle cx="1150" cy="250" r="1.4" opacity="0.6"/>
    <circle cx="600" cy="50" r="1.5" opacity="0.7"/>
  </g>

  <!-- sun -->
  <circle cx="600" cy="300" r="230" fill="url(#tc-sun)"/>
  <g stroke="#0C1122" stroke-width="6" opacity="0.85">
    <line x1="440" y1="378" x2="760" y2="378"/>
    <line x1="430" y1="410" x2="770" y2="410"/>
    <line x1="425" y1="442" x2="775" y2="442"/>
  </g>

  <!-- floor -->
  <rect x="0" y="470" width="1200" height="205" fill="#0A0E1C"/>
  <g stroke="#37E1D6" stroke-width="1.3" opacity="0.32">
    <line x1="600" y1="470" x2="-600" y2="675"/>
    <line x1="600" y1="470" x2="120" y2="675"/>
    <line x1="600" y1="470" x2="480" y2="675"/>
    <line x1="600" y1="470" x2="720" y2="675"/>
    <line x1="600" y1="470" x2="1080" y2="675"/>
    <line x1="600" y1="470" x2="1800" y2="675"/>
    <line x1="0" y1="512" x2="1200" y2="512"/>
    <line x1="0" y1="566" x2="1200" y2="566"/>
    <line x1="0" y1="636" x2="1200" y2="636"/>
  </g>

  <!-- ==== MASCOT: cute chibi bust ==== -->
  <g transform="translate(600,196) scale(1.02)">
    <!-- faint vault hex behind bust -->
    <polygon points="0,-118 100,-60 100,58 0,116 -100,58 -100,-60"
             fill="none" stroke="#263156" stroke-width="4" opacity="0.7"/>
    <g filter="url(#tc-glow)" stroke="#37E1D6" stroke-width="2.4" opacity="0.5">
      <line x1="0" y1="0" x2="0" y2="-118"/><line x1="0" y1="0" x2="100" y2="-60"/>
      <line x1="0" y1="0" x2="100" y2="58"/><line x1="0" y1="0" x2="0" y2="116"/>
      <line x1="0" y1="0" x2="-100" y2="58"/><line x1="0" y1="0" x2="-100" y2="-60"/>
    </g>
    <!-- little shoulders -->
    <path d="M-52,16 q-46,6 -58,54 L-92,92 L92,92 L92,82 q-12,-48 -58,-54 L38,28 L0,40 L-38,28 Z"
          fill="url(#tc-plate)" stroke="#060912" stroke-width="6" stroke-linejoin="round"/>
    <g fill="#F4B23C"><circle cx="-34" cy="60" r="3.4"/><circle cx="34" cy="60" r="3.4"/></g>
    <!-- crest -->
    <polygon points="0,-118 14,-110 14,-93 0,-85 -14,-93 -14,-110"
             fill="#F4B23C" stroke="#060912" stroke-width="4" stroke-linejoin="round"/>
    <!-- big round head -->
    <path d="M-66,-42 C-66,-92 -38,-116 0,-116 C38,-116 66,-92 66,-42 C66,-6 46,20 0,24 C-46,20 -66,-6 -66,-42 Z"
          fill="url(#tc-plate)" stroke="#060912" stroke-width="7" stroke-linejoin="round"/>
    <path d="M-52,-58 C-55,-86 -34,-104 -8,-106 C-26,-96 -42,-76 -48,-52 Z" fill="#6E80AC" opacity="0.45"/>
    <!-- visor goggle plate -->
    <path d="M-44,-48 C-44,-66 -26,-72 0,-72 C26,-72 44,-66 44,-48 C44,-22 26,-8 0,-7 C-26,-8 -44,-22 -44,-48 Z"
          fill="#0B1020" stroke="#060912" stroke-width="5" stroke-linejoin="round"/>
    <!-- big friendly eyes -->
    <g filter="url(#tc-glow)">
      <ellipse cx="-18" cy="-42" rx="12" ry="15" fill="url(#tc-visor)"/>
      <ellipse cx="18" cy="-42" rx="12" ry="15" fill="url(#tc-visor)"/>
    </g>
    <g fill="#FFFFFF"><circle cx="-22" cy="-48" r="3.8"/><circle cx="14" cy="-48" r="3.8"/></g>
    <!-- gold nose + cheek bolts -->
    <polygon points="-2,-6 2,-6 1,6 -1,6" fill="#F4B23C"/>
    <g fill="#F4B23C"><circle cx="-46" cy="-30" r="3.4"/><circle cx="46" cy="-30" r="3.4"/></g>
    <!-- tiny friendly smile -->
    <g filter="url(#tc-glow)">
      <path d="M-13,10 Q0,20 13,10" fill="none" stroke="#7FF5EE" stroke-width="3.5" stroke-linecap="round"/>
    </g>
  </g>

  <!-- ==== CHROME WORDMARK ==== -->
  <g text-anchor="middle" font-family="'Arial Black','Helvetica Neue',Impact,sans-serif" font-weight="900">
    <!-- ember glow / drop -->
    <text x="600" y="474" font-size="150" letter-spacing="10" fill="#F5793B" opacity="0.55" filter="url(#tc-glow)">CAISSON</text>
    <!-- dark bevel base -->
    <text x="603" y="470" font-size="150" letter-spacing="10" fill="#08101F">CAISSON</text>
    <!-- chrome face -->
    <text x="600" y="467" font-size="150" letter-spacing="10" fill="url(#chrome)" stroke="#0B1020" stroke-width="1.6">CAISSON</text>
  </g>

  <!-- tagline plate -->
  <g text-anchor="middle" font-family="'Helvetica Neue',Arial,sans-serif">
    <text x="600" y="540" font-size="26" letter-spacing="9" font-weight="700" fill="#37E1D6">NOTHING CROSSES THE GAP UNSEALED</text>
    <text x="600" y="575" font-size="16" letter-spacing="5" fill="#96A2C2">COMPLIANCE-NATIVE AIRGAP DELIVERY</text>
  </g>
</svg>
