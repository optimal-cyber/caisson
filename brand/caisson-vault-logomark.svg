<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="Caisson emblem — a sealed payload crossing the airgap between two bulkheads">
  <title>Caisson — emblem (primary mark)</title>
  <desc>A sealed gold payload locked across the airgap (a cyan seam) between two steel bulkhead doors — Caisson delivers a sealed, verified payload across the gap.</desc>
  <defs>
    <linearGradient id="ce-steel" x1="0" y1="0" x2="0.25" y2="1">
      <stop offset="0" stop-color="#DCE4F2"/><stop offset="0.5" stop-color="#AEB9D6"/><stop offset="1" stop-color="#7987AD"/>
    </linearGradient>
    <linearGradient id="ce-face" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#28324F"/><stop offset="1" stop-color="#141B33"/>
    </linearGradient>
    <radialGradient id="ce-gold" cx="0.42" cy="0.35" r="0.8">
      <stop offset="0" stop-color="#FFE29A"/><stop offset="0.5" stop-color="#F4B23C"/><stop offset="1" stop-color="#B9781E"/>
    </radialGradient>
    <filter id="ce-glow" x="-70%" y="-70%" width="240%" height="240%">
      <feGaussianBlur stdDeviation="2.4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- the airgap (cyan seam the payload crosses) -->
  <line x1="100" y1="40" x2="100" y2="160" stroke="#37E1D6" stroke-width="4" stroke-linecap="round" opacity="0.9" filter="url(#ce-glow)"/>

  <!-- left bulkhead -->
  <polygon points="22,62 36,44 72,44 72,156 36,156 22,138" fill="url(#ce-steel)" stroke="#0A1020" stroke-width="4" stroke-linejoin="round"/>
  <rect x="36" y="58" width="26" height="84" rx="6" fill="url(#ce-face)"/>
  <g fill="#F4B23C"><circle cx="29" cy="76" r="2.6"/><circle cx="29" cy="124" r="2.6"/></g>

  <!-- right bulkhead -->
  <polygon points="178,62 164,44 128,44 128,156 164,156 178,138" fill="url(#ce-steel)" stroke="#0A1020" stroke-width="4" stroke-linejoin="round"/>
  <rect x="138" y="58" width="26" height="84" rx="6" fill="url(#ce-face)"/>
  <g fill="#F4B23C"><circle cx="171" cy="76" r="2.6"/><circle cx="171" cy="124" r="2.6"/></g>

  <!-- payload (sealed unit bridging the gap) -->
  <path d="M108,66 L134,92 Q142,100 134,108 L108,134 Q100,142 92,134 L66,108 Q58,100 66,92 L92,66 Q100,58 108,66 Z"
        fill="url(#ce-gold)" stroke="#0A1020" stroke-width="4" stroke-linejoin="round"/>
  <polygon points="100,64 80,84 90,94 100,84" fill="#FFEFC2" opacity="0.55"/>

  <!-- seal lock-points -->
  <g filter="url(#ce-glow)" fill="#7FF5EE"><circle cx="66" cy="100" r="3.6"/><circle cx="134" cy="100" r="3.6"/></g>
</svg>
